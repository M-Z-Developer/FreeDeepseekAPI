<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>M-Z Dev AI | محادثة ذكية متطورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-default: linear-gradient(135deg, #0a1628 0%, #03050b 100%);
            --highlight-green: #00d4ff;
            --title-gold: #ffffff;
            --user-bubble-color: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --user-bubble-text: #e0e0e0;
            --ai-bubble-color: linear-gradient(135deg, #0f3460 0%, #1a1a4e 100%);
            --ai-bubble-text: #f0f0f0;
            --header-bg: rgba(10, 22, 40, 0.85);
            --border-color: rgba(0, 212, 255, 0.2);
            --input-bg: rgba(26, 26, 46, 0.9);
            --code-header-bg: #0a0a2a;
            --code-bg: #07071c;
        }

        body {
            font-family: 'Segoe UI', 'Tajawal', 'Cairo', system-ui, sans-serif;
            background: var(--bg-default);
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .chat-app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            position: relative;
        }

        .chat-header {
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .title-section h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        .title-section p {
            font-size: 0.65rem;
            color: #00d4ff;
            margin-top: 2px;
            opacity: 0.8;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .think-indicator {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #aaaaaa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .think-badge {
            width: 8px;
            height: 8px;
            background: #555;
            border-radius: 50%;
            transition: 0.2s;
        }

        .think-badge.active {
            background: #00d4ff;
            box-shadow: 0 0 6px #00d4ff;
        }

        .settings-icon {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #00d4ff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        
        .settings-icon:hover {
            border-color: #00d4ff;
            color: #00d4ff;
            transform: scale(1.05);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            scroll-behavior: smooth;
            position: relative;
        }

        .empty-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(0, 212, 255, 0.4);
            font-size: 1rem;
            font-weight: 400;
            pointer-events: none;
            z-index: 0;
            width: 100%;
            padding: 0 20px;
        }
        
        .empty-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
            color: #00d4ff;
        }

        .chat-messages:has(.message) .empty-placeholder {
            display: none;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #111;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 90%;
            width: fit-content;
            min-width: 80px;
            animation: fadeSlideUp 0.2s ease-out;
            position: relative;
            z-index: 2;
        }
        .user-message {
            align-self: flex-end;
            align-items: flex-end;
        }
        .ai-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble {
            padding: 0.85rem 1.2rem;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 1rem;
            font-weight: 500;
            word-wrap: break-word;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            border: 1px solid var(--border-color);
            max-width: 100%;
            width: fit-content;
        }
        
        .user-bubble {
            background: var(--user-bubble-color);
            color: var(--user-bubble-text);
            border-bottom-right-radius: 4px;
        }
        
        .ai-bubble {
            background: var(--ai-bubble-color);
            color: var(--ai-bubble-text);
            border-bottom-left-radius: 4px;
        }

        .bubble strong, .bubble b { font-weight: 800; color: #00d4ff; }
        .bubble em, .bubble i { font-style: italic; }
        .bubble code:not(.block-code) {
            background: #07071c;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }

        .code-block-wrapper { 
            margin: 12px 0; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #00d4ff; 
            background: var(--code-bg);
            max-width: 100%;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--code-header-bg);
            padding: 8px 12px;
            border-bottom: 1px solid #00d4ff;
        }
        
        .code-lang { 
            font-size: 0.75rem; 
            color: #00d4ff; 
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .code-actions { 
            display: flex; 
            gap: 8px; 
        }
        
        .code-btn {
            background: transparent; 
            border: 1px solid #00d4ff; 
            color: #00d4ff;
            font-size: 0.7rem; 
            padding: 4px 12px; 
            border-radius: 30px; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 4px;
        }
        
        .code-btn:hover { 
            background: rgba(0, 212, 255, 0.2); 
            color: #ffffff; 
            border-color: #ffffff;
        }
        
        .code-block-wrapper pre {
            margin: 0; 
            padding: 1rem; 
            overflow-x: auto; 
            font-family: monospace; 
            font-size: 0.85rem;
            max-width: 100%;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .code-block-wrapper code {
            white-space: pre-wrap;
            word-break: break-all;
            display: block;
        }

        .message-actions {
            display: flex; 
            gap: 8px; 
            margin-top: 6px; 
            opacity: 0; 
            transition: opacity 0.2s; 
            pointer-events: none;
        }
        
        .message:hover .message-actions { 
            opacity: 1; 
            pointer-events: auto; 
        }
        
        .msg-action-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff; 
            border-radius: 20px;
            padding: 4px 12px; 
            font-size: 0.65rem; 
            color: #00d4ff; 
            cursor: pointer; 
            transition: 0.2s;
        }
        
        .msg-action-btn:hover { 
            background: rgba(0, 212, 255, 0.3);
            color: #ffffff; 
        }
        
        .message-time { 
            font-size: 0.6rem; 
            color: rgba(0, 212, 255, 0.5); 
            margin: 4px 12px 0; 
        }

        .edit-textarea {
            width: 100%; 
            min-height: 80px; 
            background: #07071c; 
            color: #fff;
            border: 1px solid #00d4ff; 
            border-radius: 10px;
            padding: 10px; 
            font-family: inherit; 
            font-size: 1rem; 
            resize: vertical; 
            outline: none;
        }
        
        .edit-actions { 
            display: flex; 
            gap: 8px; 
            margin-top: 10px; 
            justify-content: flex-end; 
        }

        .typing-animation { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.85rem; 
            color: #00d4ff; 
            padding: 4px; 
        }
        
        .anim-bounce { display: flex; gap: 4px; }
        .anim-bounce span { width: 6px; height: 6px; background: #00d4ff; border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        .anim-bounce span:nth-child(2) { animation-delay: 0.2s; }
        .anim-bounce span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0% { transform: translateY(0); opacity: 0.4; } 100% { transform: translateY(-6px); opacity: 1; } }
        
        .anim-wave { display: flex; gap: 3px; height: 14px; align-items: center; }
        .anim-wave span { width: 3px; height: 100%; background: #00d4ff; animation: wave 1s infinite ease-in-out; }
        .anim-wave span:nth-child(2) { animation-delay: 0.1s; }
        .anim-wave span:nth-child(3) { animation-delay: 0.2s; }
        .anim-wave span:nth-child(4) { animation-delay: 0.3s; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.4); opacity: 0.5; } 50% { transform: scaleY(1); opacity: 1; } }
        
        .anim-pulse { width: 14px; height: 14px; background: #00d4ff; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(0, 212, 255, 0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); } }

        .anim-blink { display: flex; gap: 4px; }
        .anim-blink span { width: 6px; height: 6px; background: #00d4ff; border-radius: 1px; animation: blink 1s infinite; }
        .anim-blink span:nth-child(2) { animation-delay: 0.3s; }
        .anim-blink span:nth-child(3) { animation-delay: 0.6s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .input-area {
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(12px);
            padding: 0.9rem 1.2rem 1rem;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--input-bg);
            border-radius: 24px;
            padding: 0.3rem 0.3rem 0.3rem 0.8rem;
            border: 1px solid var(--border-color);
        }
        
        textarea#messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 6px;
            font-size: 1rem;
            font-family: inherit;
            color: #f0f0f0;
            resize: none;
            max-height: 120px;
            outline: none;
        }
        
        textarea#messageInput::placeholder {
            color: rgba(0, 212, 255, 0.5);
        }
        
        .think-toggle {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 2px;
        }
        
        .think-toggle.active { 
            border-color: #00d4ff; 
            color: #00d4ff; 
            background: rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        
        .send-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-color);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #00d4ff;
            transition: 0.2s;
            margin-bottom: 2px;
        }
        
        .send-btn:hover:not(:disabled) { 
            border-color: #00d4ff; 
            color: #ffffff;
            background: rgba(0, 212, 255, 0.3);
            transform: scale(1.05);
        }
        
        .send-btn:disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
        }

        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 12, 41, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 0 0 28px 28px;
            padding: 1.2rem 1.2rem 1.5rem;
            z-index: 200;
            border-bottom: 1px solid #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateY(-100%);
            max-height: 80vh;
            overflow-y: auto;
            direction: ltr;
        }
        
        .settings-panel.open { transform: translateY(0); }
        
        .drag-handle { 
            width: 50px; 
            height: 5px; 
            background: #00d4ff; 
            border-radius: 10px; 
            margin: 0 auto 16px auto; 
            cursor: grab; 
        }
        
        .settings-section { 
            margin-bottom: 1.2rem; 
            border-bottom: 1px solid rgba(0, 212, 255, 0.3); 
            padding-bottom: 0.8rem; 
        }
        
        .settings-section h4 { 
            font-size: 0.85rem; 
            color: #00d4ff; 
            margin-bottom: 10px; 
            text-align: right; 
        }
        
        .color-row { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            margin-top: 8px; 
            justify-content: flex-end; 
        }
        
        .color-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            font-size: 0.7rem; 
            color: #00d4ff; 
            align-items: flex-end; 
        }
        
        input[type="color"], input[type="text"] { 
            background: #0f0f0f; 
            border: 1px solid #00d4ff; 
            border-radius: 12px; 
            padding: 6px 10px; 
            color: white; 
            outline: none; 
        }
        
        input[type="file"] { 
            border: none; 
            padding: 0; 
            background: transparent; 
            color: #00d4ff; 
        }
        
        input[type="file"]::file-selector-button { 
            background: transparent; 
            border: 1px solid #00d4ff; 
            color: #00d4ff; 
            padding: 6px 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        input[type="file"]::file-selector-button:hover { 
            background: rgba(0, 212, 255, 0.2);
            color: #ffffff; 
        }
        
        .apply-grad-btn, .close-settings { 
            background: transparent; 
            border: 1px solid #00d4ff; 
            border-radius: 12px; 
            padding: 8px 12px; 
            color: #00d4ff; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        .apply-grad-btn:hover, .close-settings:hover { 
            background: rgba(0, 212, 255, 0.2);
            color: #ffffff; 
        }
        
        .close-settings { width: 100%; margin-top: 5px; }
        
        .reset-all-btn { 
            background: transparent; 
            border: 1px solid #ff4444; 
            border-radius: 12px; 
            padding: 10px; 
            width: 100%; 
            color: #ff4444; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-top: 15px; 
        }
        
        .reset-all-btn:hover { 
            background: rgba(255, 68, 68, 0.2);
            color: #ff8888;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        
        .modal-overlay.show { visibility: visible; opacity: 1; }
        
        .modal-card { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #00d4ff; 
            border-radius: 20px; 
            padding: 1.8rem; 
            text-align: center; 
            color: #eee; 
            max-width: 90%; 
        }
        
        .modal-buttons { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin-top: 20px; 
        }
        
        .modal-btn { 
            padding: 8px 24px; 
            border-radius: 12px; 
            border: 1px solid #00d4ff; 
            cursor: pointer; 
            background: transparent; 
            transition: 0.2s; 
            color: #00d4ff;
        }
        
        .modal-btn.refresh { 
            color: #00d4ff; 
            border-color: #00d4ff; 
        }
        
        .modal-btn.refresh:hover { 
            background: rgba(0, 212, 255, 0.2);
            color: #ffffff;
        }
        
        .modal-btn.cancel { 
            color: #ff4444; 
            border-color: #ff4444;
        }
        
        .modal-btn.cancel:hover { 
            background: rgba(255, 68, 68, 0.2);
            color: #ff8888;
        }

        .copy-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #00d4ff;
            color: #000;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 10000;
            animation: fadeOut 1.5s ease forwards;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        @media (max-width: 550px) { 
            .message { 
                max-width: 95%; 
            }
            .bubble {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="chat-app">
    <div class="chat-header">
        <div class="title-section">
            <h1>M-Z Dev AI</h1>
            <p>ذكاء اصطناعي | محادثات ذكية</p>
        </div>
        <div class="header-actions">
            <div class="think-indicator">
                <div class="think-badge" id="thinkBadge"></div>
                <span id="thinkLabel">سريع</span>
            </div>
            <div class="settings-icon" id="settingsIcon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="empty-placeholder" id="emptyPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <p>مرحباً بك في M-Z Dev AI<br>اكتب رسالتك الأولى لبدء المحادثة</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <textarea id="messageInput" rows="1" placeholder="اكتب رسالتك هنا ..."></textarea>
            <button class="think-toggle" id="thinkToggleBtn">
                <span>تفكير عميق</span>
            </button>
            <button class="send-btn" id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="drag-handle" id="dragHandle"></div>
        <div class="settings-section">
            <h4>الخلفية</h4>
            <div class="color-row">
                <input type="text" id="gradientInput" class="gradient-input" style="width:100%;" placeholder="أدخل لون أو تدرج (Gradient)">
                <button id="applyGradientBtn" class="apply-grad-btn">تطبيق اللون</button>
            </div>
            <div class="color-row" style="margin-top:12px;">
                <div class="color-item" style="width: 100%; flex: none;">
                    <label>أو اختر صورة للخلفية:</label>
                    <input type="file" id="bgImageInput" accept="image/*" style="width: 100%; margin-top:5px;">
                </div>
            </div>
        </div>
        <div class="settings-section">
            <h4>تخصيص الألوان</h4>
            <div class="color-row">
                <div class="color-item"><label>خلفية رسالتك</label><input type="color" id="userBgColor" value="#1a1a2e"></div>
                <div class="color-item"><label>خلفية الذكاء</label><input type="color" id="aiBgColor" value="#0f3460"></div>
            </div>
            <div class="color-row">
                <div class="color-item"><label>خط رسالتك</label><input type="color" id="userTextColor" value="#e0e0e0"></div>
                <div class="color-item"><label>خط الذكاء</label><input type="color" id="aiTextColor" value="#f0f0f0"></div>
            </div>
        </div>
        <button class="close-settings" id="closeSettingsBtn">إغلاق الإعدادات</button>
        <button class="reset-all-btn" id="resetAllDefaultsBtn">استعادة الإعدادات الافتراضية</button>
    </div>
</div>

<div id="resetModal" class="modal-overlay">
    <div class="modal-card">
        <p>تنبيه: حجم المحادثة أصبح كبيراً جداً.<br>يرجى بدء محادثة جديدة لضمان دقة الردود.</p>
        <div class="modal-buttons">
            <button class="modal-btn refresh" id="confirmResetBtn">محادثة جديدة</button>
            <button class="modal-btn cancel" id="cancelResetBtn">إلغاء</button>
        </div>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const thinkToggleBtn = document.getElementById('thinkToggleBtn');
    const thinkBadge = document.getElementById('thinkBadge');
    const thinkLabel = document.getElementById('thinkLabel');
    const settingsIcon = document.getElementById('settingsIcon');
    const settingsPanel = document.getElementById('settingsPanel');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const resetAllDefaultsBtn = document.getElementById('resetAllDefaultsBtn');
    const dragHandle = document.getElementById('dragHandle');
    const resetModal = document.getElementById('resetModal');
    const confirmResetBtn = document.getElementById('confirmResetBtn');
    const cancelResetBtn = document.getElementById('cancelResetBtn');
    const emptyPlaceholderDiv = document.getElementById('emptyPlaceholder');

    const gradientInput = document.getElementById('gradientInput');
    const applyGradientBtn = document.getElementById('applyGradientBtn');
    const bgImageInput = document.getElementById('bgImageInput');
    
    const userBgColor = document.getElementById('userBgColor');
    const userTextColor = document.getElementById('userTextColor');
    const aiBgColor = document.getElementById('aiBgColor');
    const aiTextColor = document.getElementById('aiTextColor');

    let messagesHistory = [];
    let thinkMode = false;
    let isWaitingResponse = false;
    const MAX_MESSAGES = 28;
    let nextMsgId = 1;

    function showToast(message, isSuccess = true) {
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.textContent = message;
        toast.style.background = isSuccess ? '#00d4ff' : '#ff4444';
        toast.style.color = '#000';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    async function copyToClipboard(text, btnElement) {
        const originalText = btnElement ? btnElement.innerText : 'نسخ';
        
        if (navigator.clipboard && window.isSecureContext) {
            try {
                await navigator.clipboard.writeText(text);
                showToast('✓ تم النسخ بنجاح');
                if (btnElement) {
                    btnElement.innerText = 'تم النسخ';
                    btnElement.style.color = '#00d4ff';
                    setTimeout(() => {
                        btnElement.innerText = originalText;
                        btnElement.style.color = '';
                    }, 1500);
                }
                return true;
            } catch (err) {
                console.warn('Clipboard API failed:', err);
                return fallbackCopy(text, btnElement, originalText);
            }
        } else {
            return fallbackCopy(text, btnElement, originalText);
        }
    }

    function fallbackCopy(text, btnElement, originalText) {
        try {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            textArea.style.opacity = '0';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            const successful = document.execCommand('copy');
            document.body.removeChild(textArea);
            
            if (successful) {
                showToast('✓ تم النسخ بنجاح');
                if (btnElement) {
                    btnElement.innerText = 'تم النسخ';
                    btnElement.style.color = '#00d4ff';
                    setTimeout(() => {
                        btnElement.innerText = originalText;
                        btnElement.style.color = '';
                    }, 1500);
                }
                return true;
            } else {
                throw new Error('execCommand failed');
            }
        } catch (err) {
            console.error('Fallback copy failed:', err);
            showToast('✗ فشل النسخ، يمكنك نسخ النص يدوياً', false);
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.top = '50%';
            textArea.style.left = '50%';
            textArea.style.transform = 'translate(-50%, -50%)';
            textArea.style.width = '80%';
            textArea.style.height = '200px';
            textArea.style.zIndex = '10001';
            textArea.style.background = '#1a1a2e';
            textArea.style.color = '#fff';
            textArea.style.border = '2px solid #00d4ff';
            textArea.style.borderRadius = '12px';
            textArea.style.padding = '12px';
            textArea.style.fontSize = '14px';
            document.body.appendChild(textArea);
            textArea.select();
            
            const closeBtn = document.createElement('button');
            closeBtn.innerText = 'إغلاق';
            closeBtn.style.position = 'fixed';
            closeBtn.style.bottom = 'calc(50% - 130px)';
            closeBtn.style.left = '50%';
            closeBtn.style.transform = 'translateX(-50%)';
            closeBtn.style.padding = '8px 24px';
            closeBtn.style.background = '#00d4ff';
            closeBtn.style.border = 'none';
            closeBtn.style.borderRadius = '20px';
            closeBtn.style.color = '#000';
            closeBtn.style.cursor = 'pointer';
            closeBtn.style.zIndex = '10002';
            closeBtn.onclick = () => {
                textArea.remove();
                closeBtn.remove();
            };
            document.body.appendChild(closeBtn);
            return false;
        }
    }

    function downloadCode(content, lang, btnElement) {
        try {
            let extension = 'txt';
            const langMap = {
                'javascript': 'js', 'js': 'js', 'python': 'py', 'py': 'py',
                'html': 'html', 'css': 'css', 'json': 'json', 'xml': 'xml',
                'java': 'java', 'cpp': 'cpp', 'c': 'c', 'php': 'php',
                'ruby': 'rb', 'go': 'go', 'rust': 'rs', 'swift': 'swift',
                'sql': 'sql', 'bash': 'sh', 'shell': 'sh', 'yaml': 'yml'
            };
            extension = langMap[lang.toLowerCase()] || extension;
            
            const blob = new Blob([content], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `code_${Date.now()}.${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            const originalText = btnElement ? btnElement.innerText : 'تنزيل';
            showToast('✓ تم تنزيل الملف');
            if (btnElement) {
                btnElement.innerText = 'تم التنزيل';
                btnElement.style.color = '#00d4ff';
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.color = '';
                }, 1500);
            }
        } catch (err) {
            console.error('Download failed:', err);
            showToast('✗ فشل تنزيل الملف', false);
        }
    }

    function parseBasicMarkdown(text) {
        if (!text) return '';
        let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/`(.*?)`/g, '<code class="inline-code">$1</code>');
        html = html.replace(/\n/g, '<br>');
        return html;
    }

    function updateEmptyPlaceholder() {
        const hasMessages = chatContainer.querySelectorAll('.message').length > 0;
        if (!hasMessages && emptyPlaceholderDiv.parentNode !== chatContainer) {
            chatContainer.appendChild(emptyPlaceholderDiv);
            emptyPlaceholderDiv.style.display = 'flex';
        } else if (hasMessages && emptyPlaceholderDiv.parentNode) {
            emptyPlaceholderDiv.remove();
        }
    }

    function addMessageToUI(role, content) {
        if (emptyPlaceholderDiv.parentNode) emptyPlaceholderDiv.remove();
        
        const messageId = nextMsgId++;
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        messageDiv.dataset.id = messageId;
        
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = `bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
        
        if (role === 'ai') {
            buildAIBubble(bubbleDiv, content);
        } else {
            bubbleDiv.innerHTML = parseBasicMarkdown(content);
        }
        messageDiv.appendChild(bubbleDiv);
        
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'message-actions';
        
        const copyBtn = document.createElement('button');
        copyBtn.innerText = 'نسخ';
        copyBtn.className = 'msg-action-btn';
        copyBtn.onclick = () => copyToClipboard(content, copyBtn);
        actionsDiv.appendChild(copyBtn);
        
        const editBtn = document.createElement('button');
        editBtn.innerText = 'تعديل';
        editBtn.className = 'msg-action-btn';
        editBtn.onclick = () => handleInlineEdit(messageId, bubbleDiv, actionsDiv, role, content);
        actionsDiv.appendChild(editBtn);
        
        const delBtn = document.createElement('button');
        delBtn.innerText = 'حذف';
        delBtn.className = 'msg-action-btn';
        delBtn.onclick = () => {
            if(confirm('هل أنت متأكد من حذف هذه الرسالة نهائياً؟')) {
                messageDiv.remove();
                messagesHistory = messagesHistory.filter(m => m.id !== messageId);
                updateEmptyPlaceholder();
            }
        };
        actionsDiv.appendChild(delBtn);
        
        messageDiv.appendChild(actionsDiv);
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = new Date().toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
        messageDiv.appendChild(timeSpan);
        
        chatContainer.appendChild(messageDiv);
        scrollToBottom();
        
        messagesHistory.push({ id: messageId, role, content });
        updateEmptyPlaceholder();
        return messageId;
    }

    function handleInlineEdit(messageId, bubbleDiv, actionsDiv, role, originalContent) {
        const msgObj = messagesHistory.find(m => m.id === messageId);
        if(!msgObj) return;
        
        actionsDiv.style.display = 'none';
        
        bubbleDiv.innerHTML = '';
        
        const textarea = document.createElement('textarea');
        textarea.className = 'edit-textarea';
        textarea.value = originalContent;
        
        const controls = document.createElement('div');
        controls.className = 'edit-actions';
        
        const saveBtn = document.createElement('button');
        saveBtn.className = 'msg-action-btn';
        saveBtn.style.color = '#00d4ff';
        saveBtn.style.borderColor = '#00d4ff';
        saveBtn.innerText = 'حفظ';
        
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'msg-action-btn';
        cancelBtn.innerText = 'إلغاء';
        
        controls.appendChild(saveBtn);
        controls.appendChild(cancelBtn);
        
        bubbleDiv.appendChild(textarea);
        bubbleDiv.appendChild(controls);
        
        textarea.focus();
        
        cancelBtn.onclick = () => {
            if (role === 'ai') {
                buildAIBubble(bubbleDiv, originalContent);
            } else {
                bubbleDiv.innerHTML = parseBasicMarkdown(originalContent);
            }
            actionsDiv.style.display = 'flex';
        };
        
        saveBtn.onclick = () => {
            const newText = textarea.value.trim();
            if(newText) {
                msgObj.content = newText;
                if (role === 'ai') {
                    buildAIBubble(bubbleDiv, newText);
                } else {
                    bubbleDiv.innerHTML = parseBasicMarkdown(newText);
                }
            } else {
                if (role === 'ai') {
                    buildAIBubble(bubbleDiv, originalContent);
                } else {
                    bubbleDiv.innerHTML = parseBasicMarkdown(originalContent);
                }
            }
            actionsDiv.style.display = 'flex';
        };
    }

    function buildAIBubble(container, text) {
        container.innerHTML = '';
        const codeRegex = /```(\w*)\n?([\s\S]*?)```/g;
        let lastIndex = 0;
        let match;

        while ((match = codeRegex.exec(text)) !== null) {
            if (match.index > lastIndex) {
                const textPart = text.substring(lastIndex, match.index);
                const span = document.createElement('span');
                span.innerHTML = parseBasicMarkdown(textPart);
                container.appendChild(span);
            }

            const lang = match[1] || 'code';
            const codeContent = match[2].trim();
            
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            
            const header = document.createElement('div');
            header.className = 'code-header';
            
            const langSpan = document.createElement('span');
            langSpan.className = 'code-lang';
            langSpan.innerText = lang;
            
            const acts = document.createElement('div');
            acts.className = 'code-actions';
            
            const copyC = document.createElement('button');
            copyC.className = 'code-btn';
            copyC.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> نسخ';
            copyC.onclick = (e) => {
                e.stopPropagation();
                copyToClipboard(codeContent, copyC);
            };
            
            const downC = document.createElement('button');
            downC.className = 'code-btn';
            downC.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> تنزيل';
            downC.onclick = (e) => {
                e.stopPropagation();
                downloadCode(codeContent, lang, downC);
            };
            
            acts.appendChild(copyC);
            acts.appendChild(downC);
            
            header.appendChild(langSpan);
            header.appendChild(acts);
            
            const pre = document.createElement('pre');
            const codeEl = document.createElement('code');
            codeEl.className = 'block-code';
            codeEl.textContent = codeContent;
            pre.appendChild(codeEl);
            
            wrapper.appendChild(header);
            wrapper.appendChild(pre);
            container.appendChild(wrapper);

            lastIndex = codeRegex.lastIndex;
        }

        if (lastIndex < text.length) {
            const textPart = text.substring(lastIndex);
            const span = document.createElement('span');
            span.innerHTML = parseBasicMarkdown(textPart);
            container.appendChild(span);
        }
    }

    const typingAnimations = [
        '<div class="typing-animation"><span>يحلل البيانات</span><div class="anim-bounce"><span></span><span></span><span></span></div></div>',
        '<div class="typing-animation"><span>يبحث في السياق</span><div class="anim-wave"><span></span><span></span><span></span><span></span></div></div>',
        '<div class="typing-animation"><span>يولد الرد</span><div class="anim-pulse"></div></div>',
        '<div class="typing-animation"><span>يعالج</span><div class="anim-blink"><span></span><span></span><span></span></div></div>'
    ];
    let animIndex = 0;
    function getRandomAnimation() {
        let newIdx = Math.floor(Math.random() * typingAnimations.length);
        if (newIdx === animIndex) newIdx = (newIdx + 1) % typingAnimations.length;
        animIndex = newIdx;
        return typingAnimations[animIndex];
    }

    async function sendMessageToAI(userText, currentThinkMode) {
        if (isWaitingResponse || !userText.trim()) return;
        addMessageToUI('user', userText);
        messageInput.value = '';
        autoResize();
        isWaitingResponse = true;
        setLoading(true);

        let contextMessages = messagesHistory.slice(0, -1);
        let fullContext = "";
        if (contextMessages.length > 0) {
            const lines = contextMessages.map(m => `${m.role === 'user' ? 'مستخدم' : 'مساعد'}: ${m.content}`).join('\n');
            fullContext = `[السياق]\n${lines}\n\n[رسالة جديدة]: ${userText}`;
        } else {
            fullContext = userText;
        }

        if (messagesHistory.length >= MAX_MESSAGES) {
            isWaitingResponse = false;
            setLoading(false);
            showResetModal();
            return;
        }

        const payload = { User: fullContext, Think: currentThinkMode ? "true" : "false" };
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 50000);
            const res = await fetch('https://dev-mapideepz.pantheonsite.io/Deep/index.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP Error`);
            const result = await res.json();
            if (result.success && result.data) {
                let aiResponse = result.data.response || "لا يوجد رد.";
                addMessageToUI('ai', aiResponse);
            } else {
                throw new Error('استجابة خاطئة');
            }
        } catch (err) {
            addMessageToUI('ai', `[خطأ] ${err.name === 'AbortError' ? 'انتهى وقت الطلب.' : 'حدث خطأ في الاتصال بالسيرفر.'}`);
        } finally {
            isWaitingResponse = false;
            setLoading(false);
            scrollToBottom();
        }
    }

    function setLoading(loading) {
        if (loading) {
            sendBtn.disabled = true;
            const loader = document.createElement('div');
            loader.id = 'typingIndicator';
            loader.className = 'message ai-message';
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble ai-bubble';
            bubbleDiv.innerHTML = getRandomAnimation();
            loader.appendChild(bubbleDiv);
            chatContainer.appendChild(loader);
            scrollToBottom();
        } else {
            sendBtn.disabled = false;
            const ld = document.getElementById('typingIndicator');
            if (ld) ld.remove();
        }
    }

    function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
    
    function autoResize() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    }
    
    function showResetModal() { resetModal.classList.add('show'); }
    function hideResetModal() { resetModal.classList.remove('show'); }
    
    function resetChat() {
        messagesHistory = [];
        chatContainer.innerHTML = '';
        updateEmptyPlaceholder();
        hideResetModal();
    }
    
    function handleSend() {
        if (isWaitingResponse) return;
        const txt = messageInput.value.trim();
        if (!txt) return;
        sendMessageToAI(txt, thinkMode);
    }
    
    function updateThinkUI() {
        if (thinkMode) {
            thinkBadge.classList.add('active');
            thinkToggleBtn.classList.add('active');
            thinkLabel.innerText = 'عميق';
        } else {
            thinkBadge.classList.remove('active');
            thinkToggleBtn.classList.remove('active');
            thinkLabel.innerText = 'سريع';
        }
    }

    function updateUserColors() {
        document.documentElement.style.setProperty('--user-bubble-color', userBgColor.value);
        document.documentElement.style.setProperty('--user-bubble-text', userTextColor.value);
        localStorage.setItem('userBgColor', userBgColor.value);
        localStorage.setItem('userTextColor', userTextColor.value);
    }
    
    function updateAiColors() {
        document.documentElement.style.setProperty('--ai-bubble-color', aiBgColor.value);
        document.documentElement.style.setProperty('--ai-bubble-text', aiTextColor.value);
        localStorage.setItem('aiBgColor', aiBgColor.value);
        localStorage.setItem('aiTextColor', aiTextColor.value);
    }
    
    function applyGradient(gradientValue) {
        document.body.style.background = gradientValue;
        localStorage.setItem('customGradient', gradientValue);
        localStorage.removeItem('bgImage'); 
    }
    
    bgImageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgUrl = event.target.result;
                document.body.style.background = `url(${imgUrl}) center/cover no-repeat fixed`;
                try {
                    localStorage.setItem('bgImage', imgUrl);
                    localStorage.removeItem('customGradient'); 
                } catch (err) {
                    showToast('حجم الصورة كبير جداً، سيتم تطبيقها لهذه الجلسة فقط', false);
                }
            };
            reader.readAsDataURL(file);
        }
    });

    function loadSettings() {
        const savedImg = localStorage.getItem('bgImage');
        const savedGrad = localStorage.getItem('customGradient');
        
        if (savedImg) {
            document.body.style.background = `url(${savedImg}) center/cover no-repeat fixed`;
        } else if (savedGrad) {
            document.body.style.background = savedGrad;
            gradientInput.value = savedGrad;
        }
        
        if (localStorage.getItem('userBgColor')) userBgColor.value = localStorage.getItem('userBgColor');
        if (localStorage.getItem('userTextColor')) userTextColor.value = localStorage.getItem('userTextColor');
        if (localStorage.getItem('aiBgColor')) aiBgColor.value = localStorage.getItem('aiBgColor');
        if (localStorage.getItem('aiTextColor')) aiTextColor.value = localStorage.getItem('aiTextColor');
        
        updateUserColors(); 
        updateAiColors();
    }

    resetAllDefaultsBtn.addEventListener('click', () => {
        if(confirm('هل أنت متأكد من استعادة جميع الإعدادات الافتراضية؟')) {
            localStorage.clear();
            userBgColor.value = '#1a1a2e';
            userTextColor.value = '#e0e0e0';
            aiBgColor.value = '#0f3460';
            aiTextColor.value = '#f0f0f0';
            gradientInput.value = '';
            bgImageInput.value = '';
            updateUserColors();
            updateAiColors();
            document.body.style.background = 'linear-gradient(135deg, #0a1628 0%, #03050b 100%)';
            showToast('✓ تم استعادة الإعدادات الافتراضية');
        }
    });

    let startY = 0, startTransform = 0, isDraggingPanel = false;
    function onDragStart(e) {
        isDraggingPanel = true;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        const transform = getComputedStyle(settingsPanel).transform;
        if (transform !== 'none') {
            const matrix = transform.match(/matrix.*\((.+)\)/);
            if (matrix) startTransform = parseFloat(matrix[1].split(', ')[5] || 0);
        }
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('touchmove', onDragMove);
        document.addEventListener('touchend', onDragEnd);
    }
    
    function onDragMove(e) {
        if (!isDraggingPanel) return;
        const currentY = e.touches ? e.touches[0].clientY : e.clientY;
        let delta = currentY - startY;
        let newTranslate = startTransform + delta;
        if (newTranslate > 0) newTranslate = 0;
        const maxT = settingsPanel.scrollHeight * 0.8;
        if (newTranslate < -maxT) newTranslate = -maxT;
        settingsPanel.style.transform = `translateY(${newTranslate}px)`;
    }
    
    function onDragEnd() {
        if (!isDraggingPanel) return;
        isDraggingPanel = false;
        const computed = settingsPanel.style.transform;
        let offset = 0;
        if (computed && computed !== 'none') {
            const match = computed.match(/translateY\(([-\d.]+)px\)/);
            if (match) offset = parseFloat(match[1]);
        }
        if (offset < -80) { settingsPanel.classList.remove('open'); settingsPanel.style.transform = ''; }
        else { settingsPanel.classList.add('open'); settingsPanel.style.transform = ''; }
        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('mouseup', onDragEnd);
        document.removeEventListener('touchmove', onDragMove);
        document.removeEventListener('touchend', onDragEnd);
    }

    sendBtn.addEventListener('click', handleSend);
    thinkToggleBtn.addEventListener('click', () => { thinkMode = !thinkMode; updateThinkUI(); });
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
    messageInput.addEventListener('input', autoResize);
    confirmResetBtn.addEventListener('click', resetChat);
    cancelResetBtn.addEventListener('click', hideResetModal);
    settingsIcon.addEventListener('click', () => { settingsPanel.classList.toggle('open'); if (settingsPanel.classList.contains('open')) settingsPanel.style.transform = ''; });
    closeSettingsBtn.addEventListener('click', () => { settingsPanel.classList.remove('open'); settingsPanel.style.transform = ''; });
    dragHandle.addEventListener('mousedown', onDragStart);
    dragHandle.addEventListener('touchstart', onDragStart);
    userBgColor.addEventListener('input', updateUserColors);
    userTextColor.addEventListener('input', updateUserColors);
    aiBgColor.addEventListener('input', updateAiColors);
    aiTextColor.addEventListener('input', updateAiColors);
    applyGradientBtn.addEventListener('click', () => { let grad = gradientInput.value.trim(); if (grad) applyGradient(grad); });

    loadSettings();
    updateThinkUI();
    autoResize();
    updateEmptyPlaceholder();
</script>
</body>
</html>
